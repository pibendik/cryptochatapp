name: cryptochatapp
description: A secure, privacy-first encrypted group chat application.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ">=2.3.0 <2.5.0"
  riverpod_annotation: ">=2.1.0 <2.3.5"

  # Navigation
  go_router: ^12.1.3

  # Local encrypted storage
  flutter_secure_storage: ^9.0.0

  # Local SQLite database (drift ORM)
  drift: 2.14.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.8.0

  # WebSocket
  web_socket_channel: ^2.4.0

  # Crypto — pure-Dart, no native library required, works on all platforms
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.2  # hardware acceleration on mobile (AES-GCM, etc.)

  # HTTP client for REST auth endpoints
  http: ^1.1.0

  # Push notifications — wake-only, zero content (APNs background + FCM data-only)
  # NOTE: Requires google-services.json (Android) and GoogleService-Info.plist (iOS).
  # See docs/PUSH_SETUP.md for configuration steps.
  firebase_messaging: ^14.0.0

  # QR code
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0

  # UI
  material_color_utilities: ^0.5.0

  # Serialisation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  drift_dev: 2.14.0
  riverpod_generator: ">=2.2.0 <2.3.5"
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
